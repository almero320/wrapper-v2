services:
  wrapper:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_ARCH: ${TARGET_ARCH:-x86_64}
        WRAPPER_DEBUG_HOOKS: ${WRAPPER_DEBUG_HOOKS:-OFF}
    image: wrapper-v2:latest
    container_name: wrapper-v2
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
      - SYS_CHROOT
    security_opt:
      - apparmor:unconfined
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      WRAPPER_BASE_DIR: /data
    volumes:
      - ./data:/app/rootfs/data
